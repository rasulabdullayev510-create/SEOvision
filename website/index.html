<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title id="page-title">Loading...</title>
  <meta name="description" id="page-desc" content=""/>
  <link rel="stylesheet" href="styles.css"/>
  <script src="config.js"></script>
</head>
<body>

  <header class="site-header">
    <nav class="nav">
      <div class="brand">
        <img class="brand-mark" id="brand-logo" src="" alt="logo" style="display:none"/>
        <div class="brand-emoji" id="brand-emoji" style="display:none"></div>
        <div class="brand-text">
          <span class="brand-title" id="brand-name"></span>
          <span class="brand-subtitle" id="brand-tagline"></span>
        </div>
      </div>
      <button class="menu-toggle" aria-expanded="false" aria-controls="nav-links">Menu</button>
      <div id="nav-links" class="nav-links">
        <a href="#services">Services</a>
        <a href="#pricing">Pricing</a>
        <a href="#process">Process</a>
        <a class="nav-cta" id="nav-book" href="#">Book Now</a>
      </div>
    </nav>
    <section class="hero">
      <div class="hero-content">
        <h1 id="hero-headline"></h1>
        <p class="hero-subtitle" id="hero-sub"></p>
        <div class="hero-actions">
          <a class="btn primary" id="hero-book" href="#">Book Now</a>
          <a href="#services" class="btn ghost">Our Services</a>
        </div>
        <div class="hero-stats" id="hero-stats"></div>
      </div>
    </section>
  </header>

  <main>
    <section id="services" class="section">
      <div class="section-header">
        <p class="eyebrow" id="svc-eyebrow"></p>
        <h2 id="svc-title"></h2>
        <p id="svc-sub"></p>
      </div>
      <div class="grid services-grid" id="services-grid"></div>
    </section>

    <section id="pricing" class="section muted">
      <div class="section-header">
        <p class="eyebrow" id="price-eyebrow"></p>
        <h2 id="price-title"></h2>
        <p id="price-sub"></p>
      </div>
      <div class="grid pricing-grid" id="pricing-grid"></div>
      <p id="pricing-note" style="margin-top:1rem;display:none"></p>
    </section>

    <section id="process" class="section">
      <div class="section-header">
        <p class="eyebrow" id="proc-eyebrow"></p>
        <h2 id="proc-title"></h2>
      </div>
      <div class="grid process-grid" id="process-grid"></div>
    </section>

    <section id="contact" class="section contact">
      <div class="contact-card">
        <div class="contact-simple">
          <p class="eyebrow">Contact Us</p>
          <h2>We're here to help.</h2>
          <div class="contact-details">
            <div><strong>Phone</strong><span id="contact-phone"></span></div>
            <div><strong>Email</strong><span id="contact-email"></span></div>
          </div>
        </div>
        <div class="socials" id="socials-block">
          <p class="eyebrow">Socials</p>
          <h2>Follow along.</h2>
          <div class="social-links" id="social-links"></div>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div>
      <strong id="footer-name"></strong>
      <p id="footer-tagline"></p>
    </div>
    <div class="footer-links">
      <a href="#services">Services</a>
      <a href="#pricing">Pricing</a>
      <a href="#contact">Contact</a>
    </div>
    <p class="copyright" id="footer-copy"></p>
  </footer>

  <script src="script.js"></script>
  <script>
    const C = window.CLIENT;

    // --- Brand color ---
    document.documentElement.style.setProperty('--primary', C.primaryColor || '#2563eb');
    document.documentElement.style.setProperty('--primary-dark', C.primaryDark || '#1d4ed8');

    // --- Meta & title ---
    document.getElementById('page-title').textContent = C.name;
    document.getElementById('page-desc').content = C.tagline;

    // --- Nav ---
    document.getElementById('brand-name').textContent = C.name;
    document.getElementById('brand-tagline').textContent = C.tagline;
    const logoImg = document.getElementById('brand-logo');
    const logoEmoji = document.getElementById('brand-emoji');
    if (C.logoSrc) {
      logoImg.src = C.logoSrc;
      logoImg.alt = C.name + ' logo';
      logoImg.style.display = 'block';
      logoImg.onerror = function() {
        logoImg.style.display = 'none';
        logoEmoji.style.display = 'flex';
        logoEmoji.textContent = C.logoEmoji || '';
      };
    } else {
      logoEmoji.style.display = 'flex';
      logoEmoji.textContent = C.logoEmoji || '';
    }
    document.getElementById('nav-book').href = C.bookingUrl || '#';
    document.getElementById('nav-book').textContent = C.bookButtonText || 'Book Now';

    // --- Hero ---
    const hl = C.heroHeadline || '';
    const hi = C.heroHeadlineHighlight || '';
    document.getElementById('hero-headline').innerHTML = hi
      ? hl.replace(hi, '<span class="muted-word">' + hi + '</span>')
      : hl;
    document.getElementById('hero-sub').textContent = C.heroSub || '';
    document.getElementById('hero-book').href = C.bookingUrl || '#';
    document.getElementById('hero-book').textContent = C.bookButtonText || 'Book Now';
    const statsEl = document.getElementById('hero-stats');
    (C.heroStats || []).forEach(function(s) {
      statsEl.innerHTML += '<div><strong>' + s.value + '</strong><span>' + s.label + '</span></div>';
    });

    // --- Services ---
    document.getElementById('svc-eyebrow').textContent = C.servicesEyebrow || 'Services';
    document.getElementById('svc-title').textContent = C.servicesTitle || '';
    document.getElementById('svc-sub').textContent = C.servicesSub || '';
    const svcGrid = document.getElementById('services-grid');
    (C.services || []).forEach(function(s) {
      svcGrid.innerHTML += '<article class="card"><h3>' + s.name + '</h3><p>' + s.description + '</p></article>';
    });

    // --- Pricing ---
    document.getElementById('price-eyebrow').textContent = C.pricingEyebrow || 'Pricing';
    document.getElementById('price-title').textContent = C.pricingTitle || '';
    document.getElementById('price-sub').textContent = C.pricingSub || '';
    const priceGrid = document.getElementById('pricing-grid');
    (C.pricing || []).forEach(function(cat) {
      const items = (cat.items || []).map(function(i) {
        return '<li>' + i.name + ' — ' + i.price + '</li>';
      }).join('');
      priceGrid.innerHTML += '<article class="price-card"><h3>' + cat.category + '</h3><ul>' + items + '</ul></article>';
    });
    if (C.pricingNote) {
      const noteEl = document.getElementById('pricing-note');
      noteEl.textContent = C.pricingNote;
      noteEl.style.display = 'block';
    }

    // --- Process ---
    document.getElementById('proc-eyebrow').textContent = C.processEyebrow || 'Process';
    document.getElementById('proc-title').textContent = C.processTitle || '';
    const procGrid = document.getElementById('process-grid');
    (C.process || []).forEach(function(step, i) {
      procGrid.innerHTML += '<div class="step"><span>' + (i + 1) + '</span><h3>' + step.title + '</h3><p>' + step.desc + '</p></div>';
    });

    // --- Contact ---
    document.getElementById('contact-phone').textContent = C.phone || '';
    document.getElementById('contact-email').textContent = C.email || '';

    // --- Socials ---
    const socialLinks = document.getElementById('social-links');
    const socials = [
      { url: C.instagram,      label: 'Instagram', svg: '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>' },
      { url: C.facebook,       label: 'Facebook',  svg: '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>' },
      { url: C.googleMapsLink, label: 'Google',    svg: '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12.48 10.92v3.28h7.84c-.24 1.84-.853 3.187-1.787 4.133-1.147 1.147-2.933 2.4-6.053 2.4-4.827 0-8.6-3.893-8.6-8.72s3.773-8.72 8.6-8.72c2.6 0 4.507 1.027 5.907 2.347l2.307-2.307C18.747 1.44 16.133 0 12.48 0 5.867 0 .307 5.387.307 12s5.56 12 12.173 12c3.573 0 6.267-1.173 8.373-3.36 2.16-2.16 2.84-5.213 2.84-7.667 0-.76-.053-1.467-.173-2.053H12.48z"/></svg>' },
    ];
    socials.forEach(function(s) {
      if (!s.url) return;
      socialLinks.innerHTML += '<a class="social-link" href="' + s.url + '" target="_blank" rel="noopener" aria-label="' + s.label + '">' + s.svg + '</a>';
    });
    if (!C.instagram && !C.facebook && !C.googleMapsLink) {
      document.getElementById('socials-block').style.display = 'none';
    }

    // --- Footer ---
    document.getElementById('footer-name').textContent = C.name;
    document.getElementById('footer-tagline').textContent = C.tagline;
    document.getElementById('footer-copy').textContent = '© ' + new Date().getFullYear() + ' ' + C.name + '. All rights reserved.';
  </script>
</body>
</html>
